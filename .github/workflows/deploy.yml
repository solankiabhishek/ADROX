name: Deploy to InfinityFree

on:
  push:
    branches:
      - main  # Jab aap main branch par push karenge tabhi deploy hoga

jobs:
  web-deploy:
    name: 🎉 Deploying
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4  # v3 se v4 par upgrade kiya (Supports Node 24)

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # GitHub ko force karega Node 24 use karne ke liye
      with:
        server: ${{ secrets.ftpupload.net }}
        username: ${{ secrets.if0_42009499 }}
        password: ${{ secrets.TIger290503  }}
        server-dir: /htdocs/  # InfinityFree ka root directory
